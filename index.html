<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Launching Soon</title>

    <style>
        body {
            margin: 0;
            background: black;
            color: black;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #head {
            font-weight: 900;
            font-size: 40px;
        }

        #par {
            font-size: 20px;
        }

        #head2 {
            font-size: 30px;
        }


        #startScreen {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: aquamarine;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }

        #startBtn {
            padding: 15px 30px;
            font-size: 18px;
            background: #0f7043;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            color: white;
        }

        #startBtn:hover {
            background: #00ccaa;
        }


        video {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            display: none;
        }


        #loading {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>


    <div id="startScreen">
        <h1 id="head">| LEARN. CODE. INNOVATE</h1>

        <P id="par">Think Logically, Solve Creatively.</P>

        <h2 id="head2">🚀 Bandarban University CSE Club</h2>

        <div id="loading">Click to enter launch video</div>
        <button id="startBtn">Start</button>
    </div>


    <video id="video" playsinline>
        <source src="vedio/YTDown.com_YouTube_Ceremony-Website-Launch_Media_6ukxRVphvgE_001_1080p.mp4" type="video/mp4">
        Your browser does not support video.
    </video>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const startBtn = document.getElementById("startBtn");
        const startScreen = document.getElementById("startScreen");
        const video = document.getElementById("video");

        startBtn.onclick = function () {


            startScreen.style.display = "none";


            video.style.display = "block";


            video.play();


            setTimeout(() => {
                window.location.href = "https://bandarban-university-cse-club.vercel.app/";
            }, 24000);
        };
    </script>

</body>

</html>
